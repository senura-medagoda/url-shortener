<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 560px;
            border: 1px solid #334155;
        }

        h1 {
            color: #f1f5f9;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 32px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 15px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #3b82f6;
        }

        input[type="text"]::placeholder {
            color: #475569;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .result {
            margin-top: 24px;
            padding: 16px;
            background: #0f172a;
            border-radius: 8px;
            border: 1px solid #1d4ed8;
        }

        .result-label {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .result a {
            color: #60a5fa;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            word-break: break-all;
        }

        .result a:hover {
            text-decoration: underline;
        }

        .original {
            margin-top: 8px;
            color: #64748b;
            font-size: 12px;
            word-break: break-all;
        }

        .error {
            margin-top: 24px;
            padding: 16px;
            background: #0f172a;
            border-radius: 8px;
            border: 1px solid #dc2626;
            color: #f87171;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            background: #134e4a;
            color: #5eead4;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="badge">DevOps Project 2</span>
        <h1>URL Shortener</h1>
        <p class="subtitle">Paste a long URL and get a short link instantly</p>

        <form action="/shorten" method="POST">
            <input
                type="text"
                name="url"
                placeholder="https://your-very-long-url.com/goes/here"
                required
            />
            <button type="submit">Shorten URL</button>
        </form>

        {% if short_url %}
        <div class="result">
            <div class="result-label">Your short link</div>
            <a href="{{ short_url }}" target="_blank">{{ short_url }}</a>
            <div class="original">Original: {{ original_url }}</div>
        </div>
        {% endif %}

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
